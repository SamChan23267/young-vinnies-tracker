<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Hours - Young Vinnies Tracker</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌟 Young Vinnies Volunteer Hours</h1>
            <p>See our amazing volunteers and their hours</p>
            <a href="login.html" class="btn btn-secondary login-btn">🔐 Login</a>
        </header>

        <main>
            <section class="card">
                <h2>👥 Member Hours</h2>
                <div id="public-members-list">
                    <p class="empty-state">Loading...</p>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Young Vinnies Volunteer Hour Tracker</p>
        </footer>
    </div>

    <div id="message-container"></div>

    <script>
        async function loadPublicMembers() {
            try {
                const res = await fetch('/api/public/members');
                const members = await res.json();
                const container = document.getElementById('public-members-list');

                if (!members.length) {
                    container.innerHTML = '<p class="empty-state">No volunteer data available yet.</p>';
                    return;
                }

                // Calculate competition ranking (same rank for same hours)
                let rank = 1;
                const ranked = members.map((m, i) => {
                    if (i > 0 && m.totalHours < members[i - 1].totalHours) {
                        rank = i + 1;
                    }
                    return { ...m, rank };
                });

                function getTierClass(hours) {
                    if (hours >= 60) return 'tier-gold';
                    if (hours >= 40) return 'tier-silver';
                    if (hours >= 20) return 'tier-bronze';
                    return '';
                }

                container.innerHTML = '<table><thead><tr><th>#</th><th>Name</th><th>Total Hours</th></tr></thead><tbody>' +
                    ranked.map(m => `<tr class="${getTierClass(m.totalHours)}"><td>${m.rank}</td><td>${m.name}</td><td>${m.totalHours} hr${m.totalHours !== 1 ? 's' : ''}</td></tr>`).join('') +
                    '</tbody></table>';
            } catch (e) {
                document.getElementById('public-members-list').innerHTML = '<p class="empty-state">Failed to load data.</p>';
            }
        }
        loadPublicMembers();
    </script>
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script>
        window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
